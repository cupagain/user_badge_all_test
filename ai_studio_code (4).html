            --font-body: 'Inter', sans-serif;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {

        .lvl-box { border: 1px solid var(--gold); padding: 0 6px; border-radius: 4px; color: var(--gold); font-family: var(--font-head); font-weight: 800; }

        .info-stack { display: flex; flex-direction: column; gap: 12px; }

        .val-lvl-plain { font-family: var(--font-head); font-size: 32px; color: var(--gold); line-height: 1; }

        .info-row-secondary { display: flex; align-items: center; gap: 12px; }

        .hint-label { font-size: 11px; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .hint-pos-warn { font-size: 11px; font-weight: 600; color: var(--gold); opacity: 0.8; margin-top: 4px; display: block; }
        .hint-value { font-size: 16px; font-weight: 800; color: #fff; display: block; }
        .hint-selected { color: var(--ice-blue); }

        .badge-img { width: 75px; height: 75px; margin-bottom: 12px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); pointer-events: none; }
        .badge-name { font-size: 14px; font-weight: 700; color: #f1f5f9; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-all; pointer-events: none; margin-bottom: 5px; }

            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1) 0%, transparent 100%);

        .hero-btn {

        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(25px); z-index: 15000; display: none; flex-direction: column; animation: fadeIn 0.3s ease; }
        .overlay-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--glass-border); position: relative; }
        .overlay-title { font-family: var(--font-head); font-size: 24px; font-weight: 900; color: #fff; }
        .close-overlay { position: absolute; right: 20px; top: 30px; font-size: 30px; color: #fff; cursor: pointer; border: none; background: none; opacity: 0.5; }
        .overlay-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .all-badges-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 600px) { .all-badges-grid { grid-template-columns: repeat(2, 1fr); } }
        .badge-lib-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; display: flex; align-items: center; gap: 15px; position: relative; }
        .badge-lib-item.obtained { border-color: var(--success-green); background: rgba(34, 197, 94, 0.05); }
        .lib-img { width: 60px; height: 60px; flex-shrink: 0; }
        .lib-info { flex: 1; text-align: left; }
        .lib-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; display: block; }
        .lib-desc { font-size: 12px; font-weight: 500; color: var(--text-dim); line-height: 1.4; display: block; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: 0.3s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: #111827; border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px 30px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-text { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 25px; color: #fff; }
        .modal-btn { background: var(--gold); color: #000; border: none; padding: 12px 0; width: 100%; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; }
    </style>

        };
        const uid = getCleanUserId();

        function showModal(msg) { document.getElementById('modal-msg').innerText = msg; document.getElementById('custom-modal').classList.add('show'); }
        function closeModal() { document.getElementById('custom-modal').classList.remove('show'); }
        function setLang(l) { state.lang = l; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${l}`)); updateUIStrings(); if(uid) init(); }

        function updateUIStrings() {
            const t = I18N[state.lang];
            document.getElementById('lbl-equipped').innerText = t.equipped;
            document.getElementById('lbl-my-lvl').innerText = t.my_lvl;
            document.getElementById('ui-upgrade').innerText = t.upgrade;
            document.getElementById('lbl-total').innerText = t.total;
            document.getElementById('lbl-site-lib').innerText = t.all_lib;
            document.getElementById('lbl-click-lib').innerText = t.click_lib;
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-hint-pos').innerText = t.hint_pos;
            document.getElementById('ui-zero-msg').innerText = t.zero_msg;
            document.getElementById('ui-zero-cta').innerText = t.all_btn;
            for(let i=1; i<=7; i++) { if(document.getElementById(`ui-n${i}`)) document.getElementById(`ui-n${i}`).innerText = t[`n${i}`]; }
            document.getElementById('ui-modal-btn').innerText = t.modal_btn;
        }

        // --- 核心：SOP 解析引擎 ---
        async function fetchBadgeMeta(id) {
            if (state.metaCache[id]) return state.metaCache[id];
            try {
                // 1. 建立參數
                const arr = ["badge_" + id, {}];
                const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(arr))));
                const url = `${CFG.oembed}?url=?t=${encodeURIComponent(b64)}&lang=${state.lang}`;
                
                // 2. 請求 API
                const resp = await fetch(url).then(res => res.json());
                
                // 3. DOM 解析
                const parser = new DOMParser();
                const doc = parser.parseFromString(resp.html, 'text/html');
                const title = doc.querySelector('h2')?.innerText || id.replace('campaign_', '');
                const desc = doc.querySelector('.desc p')?.innerText || "活動限定榮耀徽章";
                
                state.metaCache[id] = { title, desc };
                return state.metaCache[id];
            } catch (e) {
                return { title: id.replace('campaign_', ''), desc: "活動專屬" };
            }
        }

        async function init(isRefreshOnly = false) {
            const box = document.getElementById('display');
            const equippedGrid = document.getElementById('equipped-display-grid');
            const hero = document.getElementById('zero-badge-hero');
            if(!uid) { box.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:100px;color:#444">Please Login</div>`; return; }
            if(!isRefreshOnly) box.innerHTML = Array(4).fill(0).map(()=>`<div class="badge-item"><div class="badge-img skeleton"></div><div class="skeleton" style="height:14px;width:60%"></div></div>`).join('');
            try {
                const r = await fetch(`${CFG.data}?user_id=${uid}`).then(res => res.json());
                state.level = r.level;
                document.getElementById('ui-count').innerText = r.count;
                document.getElementById('ui-level').innerText = r.level;
                document.getElementById('ui-username-display').innerText = I18N[state.lang].username + (r.username || "---");

                if (r.count === 0) { hero.style.display = 'block'; box.style.display = 'none'; }
                else { hero.style.display = 'none'; box.style.display = 'grid'; }

                const rawIds = (r.badges || []).filter(i => i.startsWith('campaign_'));
                state.ownedIds = rawIds;

                if(!isRefreshOnly || state.list.length === 0) {
                    state.list = await Promise.all(rawIds.map(async id => {
                        const meta = await fetchBadgeMeta(id);
                        return { id, name: meta.title };
                    }));
                }

                if (rawIds.length > 0) {
                    document.getElementById('equipped-area').style.display = 'block';
                    const lastId = rawIds[rawIds.length - 1];
                    const secondLastId = rawIds.length > 1 ? rawIds[rawIds.length - 2] : null;
                    const eqList = [];
                    if (secondLastId) eqList.push({ id: secondLastId, meta: await fetchBadgeMeta(secondLastId) });
                    eqList.push({ id: lastId, meta: await fetchBadgeMeta(lastId) });
                    equippedGrid.innerHTML = eqList.map(item => `
                        <div class="equipped-box"><img src="${CFG.img}${item.id}.svg"><span>${item.meta.title}</span></div>
                    `).join('');
                }
                if (state.list.length > 0) render();
                check();
            } catch (e) { box.innerHTML = "Error Loading Data"; }
        }

        async function toggleAllBadges(show) {
            const overlay = document.getElementById('all-badges-overlay');
            const listContainer = document.getElementById('all-badges-list');
            if (show) {
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                listContainer.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:40px;">正在提取徽章元數據...</div>`;
                
                let items = [];
                for(let id of ALL_SITE_BADGES) {
                    const meta = await fetchBadgeMeta(id);
                    items.push({ id, title: meta.title, desc: meta.desc, owned: state.ownedIds.includes(id) });
                    if(items.length % 10 === 0 || items.length === ALL_SITE_BADGES.length) {
                        listContainer.innerHTML = items.map(item => `
                            <div class="badge-lib-item ${item.owned ? 'obtained' : ''}">
                                ${item.owned ? `<div class="obtained-tag">${I18N[state.lang].got_it} ✓</div>` : ''}
                                <img class="lib-img" src="${CFG.img}${item.id}.svg" style="${!item.owned ? 'opacity:0.3;filter:grayscale(1);' : ''}">
                                <div class="lib-info">
                                    <span class="lib-title">${item.title}</span>
                                    <span class="lib-desc">${item.desc}</span>
                                </div>
                            </div>
                        `).join('');
                    }
                }
                // 錄製結束，可在主控台複製 JSON
                console.log("Recorded All Data:", JSON.stringify(state.metaCache));
            } else { overlay.style.display = 'none'; document.body.style.overflow = 'auto'; }
        }

        function render() {
            const t = I18N[state.lang];
            document.getElementById('display').innerHTML = state.list.map(b => {
                const isSelected = state.selected?.id === b.id;
                const btnHtml = (state.level >= 60 && isSelected) ? `<button class="inline-confirm-btn ${state.isSubmitting?'submitting':''}" onclick="sendReq(event)">${state.isSubmitting?t.sending:t.btn}</button>` : '';
                return `<div class="badge-item ${isSelected?'selected':''}" onclick="toggleSelect('${b.id}')"><img class="badge-img" src="${CFG.img}${b.id}.svg" onerror="this.src='${CFG.img}default.svg'"><span class="badge-name">${b.name}</span>${btnHtml}</div>`;
            }).join('');
        }

        function toggleSelect(id) { if (state.isSubmitting) return; const badge = state.list.find(b => b.id === id); state.selected = (state.selected && state.selected.id === id) ? null : badge; render(); check(); }

        function check() {
            const t = I18N[state.lang];
            const card = document.getElementById('status-card'), authStatus = document.getElementById('ui-auth-status'), upgradeBtn = document.getElementById('ui-upgrade'), instArea = document.getElementById('ui-instruction'), hintLbl = document.getElementById('ui-hint-label'), hintVal = document.getElementById('ui-hint-value');
            if(state.level >= 60) {
                card.classList.add('vip-active'); authStatus.innerText = t.ok; authStatus.className = "val-status unlocked"; upgradeBtn.style.display = "none"; instArea.style.display = "block";
                if(state.selected) { hintLbl.innerText = t.hint_ready; hintVal.innerText = state.selected.name; hintVal.className = "hint-value hint-selected"; }
                else { hintLbl.innerText = t.hint_sel; hintVal.innerText = "---"; hintVal.className = "hint-value"; }
            } else { card.classList.remove('vip-active'); authStatus.innerText = t.lock; authStatus.className = "val-status"; upgradeBtn.style.display = "inline-block"; instArea.style.display = "none"; }
        }

        async function sendReq(e) {
            if (e) e.stopPropagation();
            if (state.isSubmitting || !state.selected) return;
            const t = I18N[state.lang]; state.isSubmitting = true; const startTime = Date.now(); render();
            try {
                const res = await fetch(CFG.handler, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id: uid, badge_id: state.selected.id }) });
                const d = await res.json();
                const elapsed = Date.now() - startTime; if (elapsed < 4000) await new Promise(r => setTimeout(r, 4000 - elapsed));
                if (res.ok) { showModal(t.success); state.selected = null; setTimeout(() => init(true), 500); }
                else showModal(`❌: Error`);
            } catch { showModal("Network Error"); } finally { state.isSubmitting = false; render(); check(); }
        }
        setLang('zh-hant');
    </script>
</body>
</html>
