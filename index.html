<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>帳號徽章更換 | SWAG Premium</title>

    <style>
        :root {
            --bg: #04060a;
            --glass-deep: rgba(15, 23, 42, 0.95);
            --glass-border: rgba(255, 255, 255, 0.12);
            --gold: #fbbf24;
            --pink: #ff2d55;
            --ice-blue: #38bdf8;
            --success-green: #22c55e;
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); color: #fff; font-family: var(--font-body);
            background-image: radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 50%);
            min-height: 100vh; padding-bottom: 60px; overflow-x: hidden;
        }

        /* 語言切換 */
        .top-nav { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; gap: 6px; }
        .lang-btn { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .lang-btn.active { background: #fff; color: #000; border-color: #fff; }

        /* 1. 標題與帳號 */
        .header-area { text-align: center; padding: 70px 20px 15px; }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        .main-title { 
            font-family: var(--font-head); font-size: 30px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;
            background: linear-gradient(90deg, #fff 0%, #94a3b8 25%, #fff 50%, #94a3b8 75%, #fff 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite; white-space: nowrap;
        }
        .username-line { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 15px; display: block; opacity: 0.9; }

        .bento-row { max-width: 1000px; margin: 0 auto 20px; padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .bento-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 20px 15px; text-align: center; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .bento-card.blue { border-color: var(--ice-blue); background: rgba(56, 189, 248, 0.03); }
        .bento-card.gold-cta { 
            border-color: var(--gold); background: linear-gradient(135deg, rgba(251, 191, 36, 0.1) 0%, transparent 100%); 
            cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 0 25px rgba(251, 191, 36, 0.15);
        }
        .bento-card.gold-cta::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent); transform: rotate(45deg); animation: shimmer 3s infinite; }

        .b-label { font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .b-val { font-family: var(--font-head); font-size: 32px; font-weight: 900; line-height: 1; }
        .b-val.blue { color: var(--ice-blue); }
        .b-val.gold { color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .b-sub { font-size: 11px; font-weight: 700; color: #fff; margin-top: 6px; opacity: 0.8; }

        /* 2. 帳號顯示徽章 */
        .equipped-section { max-width: 1000px; margin: 0 auto 15px; padding: 0 16px; }
        .equipped-title { font-size: 12px; font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
        .equipped-grid { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
        .equipped-box {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 25px 10px 10px; display: flex; flex-direction: column; align-items: center; text-align: center;
            backdrop-filter: blur(10px); width: calc(50% - 7px); max-width: 180px; transition: 0.3s;
        }
        .equipped-box img { width: 75px; height: 75px; margin-bottom: 10px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6)); }
        .equipped-box span { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.2; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* 3. 身份中心與更換按鈕 */
        .control-section { max-width: 600px; margin: 0 auto 20px; padding: 0 16px; }
        .auth-card { background: var(--glass-deep); border: 1px solid var(--glass-border); border-radius: 28px; padding: 24px; backdrop-filter: blur(30px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .auth-card.vip-active { border-color: rgba(251, 191, 36, 0.4); }
        .card-header { border-bottom: 1px solid var(--glass-border); padding-bottom: 18px; margin-bottom: 22px; }
        .feat-title { font-family: var(--font-head); font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 8px; display: block; }
        .vip-desc-line { font-size: 13.5px; color: #cbd5e1; font-weight: 600; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .lvl-box { border: 1px solid var(--gold); padding: 0 6px; border-radius: 4px; color: var(--gold); font-family: var(--font-head); font-weight: 800; }

        .info-stack { display: flex; flex-direction: column; gap: 16px; }
        .info-row-primary { display: flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 800; color: #fff; height: 34px; }
        .val-lvl-plain { font-family: var(--font-head); font-size: 28px; color: var(--gold); line-height: 1; }

        .info-row-secondary { display: flex; align-items: center; gap: 12px; }
        .val-status { font-size: 15px; font-weight: 800; color: #64748b; line-height: 1; }
        .val-status.unlocked { color: var(--gold); }
        .upgrade-cta-inline { background: linear-gradient(135deg, var(--pink) 0%, #ff5e7e 100%); color: #fff; font-size: 11px; font-weight: 800; padding: 4px 12px; border-radius: 6px; text-decoration: none; display: none; box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3); white-space: nowrap; }

        /* 4. 徽章全覽網格 */
        .instruction-area { text-align: center; margin-bottom: 15px; min-height: 52px; padding: 0 20px; }
        .hint-label { font-size: 11px; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .hint-pos-warn { font-size: 11px; font-weight: 600; color: var(--gold); opacity: 0.8; margin-top: 4px; display: block; }
        .hint-value { font-size: 16px; font-weight: 800; color: #fff; display: block; }
        .hint-selected { color: var(--ice-blue); }

        .badge-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding: 0 16px 30px; max-width: 1000px; margin: 0 auto; justify-content: center; }
        @media (min-width: 768px) { .badge-grid { grid-template-columns: repeat(auto-fit, 180px); justify-content: center; } }
        .badge-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 28px; padding: 30px 10px 10px; text-align: center; cursor: pointer; position: relative; transition: 0.3s; display: flex; flex-direction: column; align-items: center; height: 100%; }
        .badge-item.selected { border-color: var(--gold); background: rgba(251, 191, 36, 0.12); transform: scale(1.02); }
        .badge-item.selected::after { content: '✓'; position: absolute; top: 12px; right: 15px; color: var(--gold); font-weight: 900; font-size: 18px; }
        .badge-img { width: 75px; height: 75px; margin-bottom: 12px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); pointer-events: none; }
        .badge-name { font-size: 14px; font-weight: 700; color: #f1f5f9; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-all; pointer-events: none; margin-bottom: 5px; }

        .inline-confirm-btn { background: var(--gold); color: #000; border: none; padding: 8px 0; width: 90%; border-radius: 10px; font-family: var(--font-head); font-size: 13px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); animation: fadeIn 0.3s ease forwards; }
        .inline-confirm-btn.submitting { opacity: 0.7; cursor: wait; filter: grayscale(0.5); }

        /* 5. 零徽章引導 */
        .zero-badge-hero { max-width: 600px; margin: 30px auto; padding: 40px 20px; text-align: center; background: linear-gradient(135deg, rgba(251, 191, 36, 0.15) 0%, transparent 100%); border: 2px dashed var(--gold); border-radius: 32px; }
        .hero-btn { background: var(--gold); color: #000; padding: 15px 35px; border-radius: 100px; font-size: 16px; font-weight: 900; border: none; cursor: pointer; box-shadow: 0 0 40px rgba(251, 191, 36, 0.4); animation: pulse-gold 2s infinite; }

        /* 6. 注意事項清單 */
        .footer { max-width: 600px; margin: 60px auto 0; padding: 30px 20px 80px; border-top: 1px solid var(--glass-border); }
        .notice-list { list-style: none; padding: 0; }
        .notice-item { font-size: 13px; color: #64748b; font-weight: 600; line-height: 1.8; margin-bottom: 10px; display: flex; gap: 10px; text-align: left; align-items: flex-start; }
        .notice-item::before { content: "•"; color: #64748b; font-weight: 900; font-size: 18px; line-height: 1.2; flex-shrink: 0; margin-top: 3px; }
        .notice-alert { color: var(--pink) !important; font-weight: 800 !important; }

        /* 7. 全站圖鑑面板 */
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(25px); z-index: 15000; display: none; flex-direction: column; animation: fadeIn 0.3s ease; }
        .overlay-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--glass-border); position: relative; }
        .overlay-title { font-family: var(--font-head); font-size: 24px; font-weight: 900; color: #fff; }
        .close-overlay { position: absolute; right: 20px; top: 30px; font-size: 30px; color: #fff; cursor: pointer; border: none; background: none; }
        .overlay-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .lib-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 600px) { .lib-grid { grid-template-columns: 1fr 1fr; } }
        .lib-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; display: flex; align-items: center; gap: 15px; position: relative; transition: 0.3s; }
        .lib-card.owned { border-color: var(--gold); background: rgba(251, 191, 36, 0.05); animation: pulse-owned 3s infinite; }
        @keyframes pulse-owned { 0%, 100% { border-color: var(--gold); } 50% { border-color: #fff; } }
        .lib-img { width: 55px; height: 55px; flex-shrink: 0; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .lib-info { flex: 1; text-align: left; }
        .lib-name { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; display: block; }
        .lib-desc { font-size: 11px; font-weight: 500; color: var(--text-dim); line-height: 1.4; display: block; }
        .owned-tag { position: absolute; top: 12px; right: 15px; color: var(--gold); font-size: 10px; font-weight: 900; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: 0.3s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: #111827; border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px 30px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-text { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 25px; color: #fff; }
        .modal-btn { background: var(--gold); color: #000; border: none; padding: 12px 0; width: 100%; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

        const CFG = {
            data: 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges',

            trs: 'https://api.swag.live/translations'
        };

        const I18N = {
            'zh-hant': { 
                title:"我的榮耀徽章全覽", username: "帳號：", total:"徽章總數", my_lvl:"我的 VIP 等級：", btn:"確認上架", upgrade: "立即升級", feat_h:"帳號徽章更換", vip_pre: "等級至", vip_suf: "可解鎖徽章更換", lock:"未達標", ok:"符合資格", hint_sel:"請選取下方想更換徽章", hint_ready:"已選取", hint_pos:"將替換左側徽章，上架之徽章呈現於右側", equipped: "帳號顯示徽章", empty: "暫無可選徽章", login: "請登入後查看徽章", success: "✅ 送出成功", cooldown: "⏳ 請等待至少 20 秒再送出請求", modal_btn: "確定", all_title: "全站歷史徽章庫", got_it: "已獲得", sending: "處理中...", all_lib: "全站歷史收藏", view_lib: "點擊查看圖鑑", zero_msg: "您目前尚未擁有任何直播間徽章",
                n1:"本頁面呈現您的帳號所有徽章", n2:"帳號等級達到 VIP Level 60 可解鎖徽章更換", n3:"每次更換需等約 20 秒，請勿頻繁送出需求", n4:"徽章更換完成，可至直播間查看", n5:"徽章與等級需登入後完整顯示", n6:"資料至少需 10 分鐘更新時間", n7:"【重要】為了保護您的帳號，切勿將徽章介面分享給他人，以免造成帳號冒用或徽章損失。"
            },
            'en': { title:"Badge Gallery", username: "Account: ", total:"Total", my_lvl:"My VIP Level: ", btn:"Confirm", upgrade: "Upgrade", feat_h:"Badge Swap", vip_pre: "Reach", vip_suf: "to unlock swap", lock:"Ineligible", ok:"Qualified", hint_sel:"Select a badge below", hint_ready:"Selected", hint_pos:"New one shows on right", equipped: "Display Badges", empty: "No badges", login: "Please login", success: "✅ Success", cooldown: "⏳ Wait 20s", modal_btn: "OK", all_title: "Historical Badges", got_it: "Owned", all_lib: "Library", view_lib: "View Catalog", zero_msg: "No badges found" }
        };

        let state = { lang:'zh-hant', level:0, selected:null, list:[], ownedIds: [], isSubmitting: false };
        const getCleanUserId = () => {
            const getFromUrl = (url) => { if (!url) return null; const decoded = decodeURIComponent(url); const match = decoded.match(/[?&](user_id|uid|userId)=([a-zA-Z0-9]{24,48})/i); return match ? match[2] : null; };
            let rawId = getFromUrl(window.location.href) || getFromUrl(document.referrer);
            if (!rawId) { const params = new URLSearchParams(window.location.search); const sourceParam = params.get('source'); if (sourceParam) rawId = getFromUrl(sourceParam); }
            return rawId && rawId.length >= 48 ? rawId.substring(12, rawId.length - 12) : rawId;
        };
        const uid = getCleanUserId();

        function showModal(msg) { document.getElementById('modal-msg').innerText = msg; document.getElementById('custom-modal').classList.add('show'); }
        function closeModal() { document.getElementById('custom-modal').classList.remove('show'); }
        function setLang(l) { state.lang = l; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${l}`)); updateUIStrings(); if(uid) init(); }

        function updateUIStrings() {
            const t = I18N[state.lang];
            document.getElementById('lbl-equipped').innerText = t.equipped;
            document.getElementById('lbl-my-lvl').innerText = t.my_lvl;
            document.getElementById('ui-upgrade').innerText = t.upgrade;
            document.getElementById('lbl-total').innerText = t.total;
            document.getElementById('lbl-site-lib').innerText = t.all_lib;
            document.getElementById('lbl-view-lib').innerText = t.view_lib;
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-hint-pos').innerText = t.hint_pos;
            document.getElementById('ui-zero-cta').innerText = t.all_title;
            for(let i=1; i<=7; i++) { const el = document.getElementById(`ui-n${i}`); if(el) el.innerText = t[`n${i}`]; }
            document.getElementById('ui-modal-btn').innerText = t.modal_btn;
        }

        async function init(isRefreshOnly = false) {
            const box = document.getElementById('display');
            const equippedGrid = document.getElementById('equipped-display-grid');
            const hero = document.getElementById('zero-badge-hero');
            if(!uid) { box.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:100px;color:#444">Please Login</div>`; return; }
            if(!isRefreshOnly) box.innerHTML = Array(4).fill(0).map(()=>`<div class="badge-item"><div class="badge-img skeleton"></div><div class="skeleton" style="height:14px;width:60%"></div></div>`).join('');
            try {
                const r = await fetch(`${CFG.data}?user_id=${uid}`).then(res => res.json());
                state.level = r.level;
                document.getElementById('ui-count').innerText = r.count;
                document.getElementById('ui-level').innerText = r.level;
                document.getElementById('ui-username-display').innerText = I18N[state.lang].username + (r.username || "---");

                if (r.count === 0) { hero.style.display = 'block'; box.style.display = 'none'; }
                else { hero.style.display = 'none'; box.style.display = 'grid'; }

                const rawIds = (r.badges || []).filter(i => i.startsWith('campaign_'));
                state.ownedIds = rawIds;

                if(!isRefreshOnly || state.list.length === 0) {
                    state.list = await Promise.all(rawIds.map(async id => {
                        try {
                            const t = await fetch(`${CFG.trs}?lang=${state.lang}&key=badge_${id}`).then(res => res.json());
                            return { id, name: t[`badge_${id}`] || id };
                        } catch { return { id, name: id }; }
                    }));
                }

                if (rawIds.length > 0) {
                    document.getElementById('equipped-area').style.display = 'block';
                    const lastId = rawIds[rawIds.length - 1];
                    const secondLastId = rawIds.length > 1 ? rawIds[rawIds.length - 2] : null;
                    const fetchName = async (id) => {
                        const t = await fetch(`${CFG.trs}?lang=${state.lang}&key=badge_${id}`).then(res => res.json());
                        return t[`badge_${id}`] || id;
                    };
                    const eqList = [];
                    if (secondLastId) eqList.push({ id: secondLastId, name: await fetchName(secondLastId) });
                    eqList.push({ id: lastId, name: await fetchName(lastId) });
                    equippedGrid.innerHTML = eqList.map(item => `<div class="equipped-box"><img src="${CFG.img}${item.id}.svg"><span>${item.name}</span></div>`).join('');
                }
                if (state.list.length > 0) render();
                check();
            } catch (e) { box.innerHTML = "Error Loading Data"; }
        }

        function toggleAllBadges(show) {
            const overlay = document.getElementById('all-badges-overlay');
            if (show) {
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                const list = document.getElementById('all-badges-list');
                list.innerHTML = Object.entries(GLOBAL_BADGE_DB).map(([id, info]) => {
                    const owned = state.ownedIds.includes(id);
                    return `
                        <div class="lib-card ${owned?'owned':''}">
                            ${owned?`<div class="owned-tag">${I18N[state.lang].got_it} ✓</div>`:''}
                            <img class="lib-img" src="${CFG.img}${id}.svg">
                            <div class="lib-info">
                                <span class="lib-name">${info.title}</span>
                                <span class="lib-desc">${info.desc}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } else { overlay.style.display = 'none'; document.body.style.overflow = 'auto'; }
        }

        function render() {
            const t = I18N[state.lang];
            document.getElementById('display').innerHTML = state.list.map(b => {
                const isSelected = state.selected?.id === b.id;
                const btnHtml = (state.level >= 60 && isSelected) ? `<button class="inline-confirm-btn ${state.isSubmitting?'submitting':''}" onclick="sendReq(event)">${state.isSubmitting?t.sending:t.btn}</button>` : '';
                return `<div class="badge-item ${isSelected?'selected':''}" onclick="toggleSelect('${b.id}')"><img class="badge-img" src="${CFG.img}${b.id}.svg" onerror="this.src='${CFG.img}default.svg'"><span class="badge-name">${b.name}</span>${btnHtml}</div>`;
            }).join('');
        }

        function toggleSelect(id) { if (state.isSubmitting) return; const badge = state.list.find(b => b.id === id); state.selected = (state.selected && state.selected.id === id) ? null : badge; render(); check(); }

        function check() {
            const t = I18N[state.lang];
            const card = document.getElementById('status-card'), authStatus = document.getElementById('ui-auth-status'), upgradeBtn = document.getElementById('ui-upgrade'), instArea = document.getElementById('ui-instruction'), hintLbl = document.getElementById('ui-hint-label'), hintVal = document.getElementById('ui-hint-value');
            if(state.level >= 60) {
                card.classList.add('vip-active'); authStatus.innerText = t.ok; authStatus.className = "val-status unlocked"; upgradeBtn.style.display = "none"; instArea.style.display = "block";
                if(state.selected) { hintLbl.innerText = t.hint_ready; hintVal.innerText = state.selected.name; hintVal.className = "hint-value hint-selected"; }
                else { hintLbl.innerText = t.hint_sel; hintVal.innerText = "---"; hintVal.className = "hint-value"; }
            } else { card.classList.remove('vip-active'); authStatus.innerText = t.lock; authStatus.className = "val-status"; upgradeBtn.style.display = "inline-block"; instArea.style.display = "none"; }
        }

        async function sendReq(e) {
            if (e) e.stopPropagation();
            if (state.isSubmitting || !state.selected) return;
            const t = I18N[state.lang]; state.isSubmitting = true; const startTime = Date.now(); render();
            try {
                const res = await fetch(CFG.handler, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id: uid, badge_id: state.selected.id }) });
                const d = await res.json();
                const elapsed = Date.now() - startTime; if (elapsed < 5000) await new Promise(r => setTimeout(r, 5000 - elapsed));
                if (res.ok) { showModal(t.success); state.selected = null; setTimeout(() => init(true), 500); }
                else if (res.status === 429) showModal(t.cooldown);
                else showModal(`❌: Error`);
            } catch { showModal("Network Error"); } finally { state.isSubmitting = false; render(); check(); }
        }
        setLang('zh-hant');
    </script>
