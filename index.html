<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>帳號徽章更換 | SWAG Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #04060a;
            --glass-deep: rgba(15, 23, 42, 0.95);
            --glass-border: rgba(255, 255, 255, 0.12);
            --gold: #fbbf24;
            --pink: #ff2d55;
            --ice-blue: #38bdf8;
            --success-green: #22c55e;
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); color: #fff; font-family: var(--font-body);
            background-image: radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 50%);
            min-height: 100vh; padding-bottom: 60px; overflow-x: hidden;
        }

        /* 語言切換 */
        .top-nav { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; gap: 6px; }
        .lang-btn { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .lang-btn.active { background: #fff; color: #000; border-color: #fff; }

        /* 1. 標題與基礎資訊 */
        .header-area { text-align: center; padding: 70px 20px 15px; }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        .main-title { 
            font-family: var(--font-head); font-size: 30px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;
            background: linear-gradient(90deg, #fff 0%, #94a3b8 25%, #fff 50%, #94a3b8 75%, #fff 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite; white-space: nowrap;
        }
        .username-line { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 20px; display: block; opacity: 0.9; }

        /* 極簡化徽章總數 */
        .minimal-total-box {
            display: inline-flex; align-items: center; gap: 8px;
            border: 1px solid rgba(56, 189, 248, 0.4); background: rgba(56, 189, 248, 0.05);
            padding: 6px 16px; border-radius: 100px; margin-bottom: 25px;
        }
        .mt-label { font-size: 12px; font-weight: 600; color: var(--text-dim); }
        .mt-val { font-family: var(--font-head); font-size: 16px; font-weight: 800; color: var(--ice-blue); }

        /* 全站歷史徽章獨立大區塊 */
        .hero-banner-wrap { max-width: 600px; margin: 0 auto 25px; padding: 0 16px; }
        .library-hero-card { 
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.15) 0%, rgba(251, 191, 36, 0.02) 100%); 
            border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 20px;
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .library-hero-card:active { transform: scale(0.98); }
        .library-hero-card::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent); transform: rotate(45deg); animation: shimmer 3s infinite; pointer-events: none;}
        .lh-info { text-align: left; }
        .lh-title { font-size: 16px; font-weight: 800; color: var(--gold); margin-bottom: 4px; display: block; }
        .lh-desc { font-size: 12px; color: #cbd5e1; font-weight: 600; }
        /* 優化需求 5：增加前後綴文字，讓總數意義明確 */
        .lh-count { font-family: var(--font-head); font-size: 24px; font-weight: 900; color: #fff; display: flex; align-items: baseline; gap: 4px; }
        .lh-count-text { font-size: 12px; font-weight: 600; color: var(--text-dim); font-family: var(--font-body); }
        .lh-arrow { font-size: 14px; color: var(--gold); opacity: 0.8; margin-left: 4px; }

        /* 2. 帳號顯示徽章 (還原大小) */
        .equipped-section { max-width: 1000px; margin: 0 auto 20px; padding: 0 16px; }
        .section-title { font-size: 12px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
        .equipped-grid { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
        .equipped-box {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 25px 10px 10px; display: flex; flex-direction: column; align-items: center; text-align: center;
            backdrop-filter: blur(10px); width: calc(50% - 7px); max-width: 180px; transition: 0.3s;
        }
        .equipped-box img { width: 75px; height: 75px; margin-bottom: 10px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6)); }
        .equipped-box span { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.2; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* 優化需求 4：權限卡片放大、規則清楚 */
        .control-section { max-width: 600px; margin: 0 auto 20px; padding: 0 16px; }
        .auth-card { 
            background: var(--glass-deep); border: 1px solid var(--glass-border); border-radius: 24px; 
            padding: 20px 24px; backdrop-filter: blur(30px); display: flex; flex-direction: column; gap: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .auth-card.vip-active { border-color: rgba(251, 191, 36, 0.4); }
        .ac-header { display: flex; flex-direction: column; gap: 6px; border-bottom: 1px solid var(--glass-border); padding-bottom: 14px; }
        .ac-title { font-family: var(--font-head); font-size: 18px; font-weight: 800; color: #fff; }
        .ac-rule { font-size: 13.5px; color: #cbd5e1; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .lvl-box { border: 1px solid var(--gold); padding: 0 6px; border-radius: 4px; color: var(--gold); font-family: var(--font-head); font-weight: 800; font-size: 12px; }
        
        .ac-body { display: flex; align-items: center; justify-content: space-between; }
        .ac-my-lvl { font-size: 16px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
        .val-lvl-plain { font-family: var(--font-head); font-size: 24px; color: var(--gold); line-height: 1; }
        .ac-status-area { display: flex; align-items: center; gap: 12px; }
        .val-status { font-size: 14px; font-weight: 800; color: #64748b; }
        .val-status.unlocked { color: var(--gold); }
        .upgrade-cta-inline { 
            background: linear-gradient(135deg, var(--pink) 0%, #ff5e7e 100%);
            color: #fff; font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: 8px;
            text-decoration: none; display: none; box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3);
            white-space: nowrap;
        }

        /* 4. 徽章更換提示 (還原原文案與排版) */
        .instruction-area { text-align: center; margin-bottom: 15px; min-height: 48px; padding: 0 20px; }
        .hint-label { font-size: 11px; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .hint-pos-warn { font-size: 11px; font-weight: 600; color: var(--gold); opacity: 0.8; margin-top: 4px; display: block; margin-bottom: 6px; }
        .hint-value { font-size: 16px; font-weight: 800; color: #fff; display: block; }
        .hint-selected { color: var(--ice-blue); }

        /* 網格區塊 (還原大小) */
        .badge-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding: 0 16px 30px; max-width: 1000px; margin: 0 auto; justify-content: center; }
        @media (min-width: 768px) { .badge-grid { grid-template-columns: repeat(auto-fit, 180px); justify-content: center; } }
        .badge-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 28px; padding: 30px 10px 10px; text-align: center; cursor: pointer; position: relative; transition: 0.3s; display: flex; flex-direction: column; align-items: center; height: 100%; }
        .badge-item.selected { border-color: var(--gold); background: rgba(251, 191, 36, 0.12); transform: scale(1.02); }
        .badge-item.selected::after { content: '✓'; position: absolute; top: 12px; right: 15px; color: var(--gold); font-weight: 900; font-size: 18px; }
        .badge-img { width: 75px; height: 75px; margin-bottom: 12px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); pointer-events: none; }
        .badge-name { font-size: 14px; font-weight: 700; color: #f1f5f9; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-all; pointer-events: none; margin-bottom: 5px; }

        .inline-confirm-btn { background: var(--gold); color: #000; border: none; padding: 8px 0; width: 90%; border-radius: 10px; font-family: var(--font-head); font-size: 13px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); animation: fadeIn 0.3s ease forwards; margin-top: auto; }
        .inline-confirm-btn.submitting { opacity: 0.7; cursor: wait; filter: grayscale(0.5); }

        /* 零徽章引導 */
        .zero-badge-hero { max-width: 600px; margin: 30px auto; padding: 40px 20px; text-align: center; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 24px; backdrop-filter: blur(10px); }
        .zero-badge-hero p { font-size: 15px; font-weight: 700; color: var(--text-dim); margin-bottom: 20px; }
        .hero-btn { background: rgba(255,255,255,0.1); color: #fff; padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 700; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s; }

        /* 注意事項 */
        .footer { max-width: 600px; margin: 40px auto 0; padding: 30px 20px 80px; border-top: 1px solid var(--glass-border); }
        .notice-list { list-style: none; padding: 0; }
        .notice-item { font-size: 12px; color: #64748b; font-weight: 600; line-height: 1.6; margin-bottom: 8px; display: flex; gap: 8px; text-align: left; align-items: flex-start; }
        .notice-item::before { content: "•"; color: #64748b; font-weight: 900; font-size: 16px; line-height: 1.2; flex-shrink: 0; margin-top: 1px; }
        .notice-alert { color: var(--pink) !important; font-weight: 800 !important; }

        /* 圖鑑面板與分類篩選 */
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); z-index: 15000; display: none; flex-direction: column; animation: fadeIn 0.2s ease; }
        .overlay-header { padding: 25px 20px 15px; text-align: center; position: relative; flex-shrink: 0; }
        .overlay-title { font-family: var(--font-head); font-size: 20px; font-weight: 900; color: #fff; }
        .close-overlay { position: absolute; right: 20px; top: 20px; font-size: 28px; color: #94a3b8; cursor: pointer; border: none; background: none; }
        
        .overlay-filters { display: flex; justify-content: center; gap: 10px; padding: 0 20px 15px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #94a3b8; padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .overlay-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .lib-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 600px) { .lib-grid { grid-template-columns: 1fr 1fr; } }
        .lib-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 16px; display: flex; align-items: flex-start; gap: 15px; transition: 0.3s; }
        .lib-card.owned { border-color: rgba(251, 191, 36, 0.4); background: rgba(251, 191, 36, 0.05); }
        .lib-img { width: 50px; height: 50px; flex-shrink: 0; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); margin-top: 4px; }
        
        .lib-info { flex: 1; min-width: 0; text-align: left; }
        .lib-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
        .lib-name { font-size: 14px; font-weight: 800; color: #fff; line-height: 1.3; }
        .owned-tag { background: rgba(251, 191, 36, 0.15); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; flex-shrink: 0; border: 1px solid rgba(251, 191, 36, 0.3); }
        
        .lib-subtitle { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 4px; display: block; opacity: 0.9; }
        .lib-desc { font-size: 12px; font-weight: 500; color: var(--text-dim); line-height: 1.4; display: block; }
        .lib-date { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; color: #cbd5e1; background: rgba(255, 255, 255, 0.1); padding: 3px 6px; border-radius: 4px; margin-top: 6px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: 0.3s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: #111827; border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px 24px; width: 100%; max-width: 300px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-text { font-size: 15px; font-weight: 600; line-height: 1.6; margin-bottom: 25px; color: #fff; }
        .modal-btn { background: var(--gold); color: #000; border: none; padding: 12px 0; width: 100%; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .skeleton { background: linear-gradient(90deg, #0a0c10 25%, #1a1c22 50%, #0a0c10 75%); background-size: 200% 100%; animation: load 1.5s infinite linear; border-radius: 12px; }
        @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="lang-btn active" id="btn-zh-hant" onclick="setLang('zh-hant')">繁中</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </nav>

    <header class="header-area">
        <h1 class="main-title" id="ui-title">我的榮耀徽章全覽</h1>
        <span class="username-line" id="ui-username-display">帳號：----</span>
        
        <div class="minimal-total-box">
            <span class="mt-label" id="lbl-total">帳號徽章總數</span>
            <span class="mt-val" id="ui-count">--</span>
        </div>

    <div class="hero-banner-wrap">
        <div class="library-hero-card" onclick="toggleAllBadges(true)">
            <div class="lh-info">
                <span class="lh-title" id="lbl-site-lib">全站歷史徽章庫</span>

            </div>
            <div class="lh-count">
                <span class="lh-count-text" id="lbl-count-pre">收錄共</span> 
                <span id="ui-total-db-count">--</span> 
                <span class="lh-count-text" id="lbl-count-suf">款</span> 
                <span class="lh-arrow">➔</span>
            </div>
        </div>
    </div>

    <section class="equipped-section" id="equipped-area" style="display: none;">
        <p class="section-title" id="lbl-equipped">帳號顯示徽章</p>
        <div class="equipped-grid" id="equipped-display-grid"></div>
    </section>

    <section class="control-section">
        <div class="auth-card" id="status-card">
            <div class="ac-header">
                <span class="ac-title" id="ui-feat-h">帳號徽章更換</span>

            </div>
            <div class="ac-body">

                <div class="ac-status-area">
                    <span class="val-status" id="ui-auth-status">未達標</span>
                    <a href="https://swag.live/settings/vvip" target="_blank" class="upgrade-cta-inline" id="ui-upgrade">立即升級</a>
                </div>
            </div>
        </div>
    </section>

    <div class="instruction-area" id="ui-instruction" style="display: none;">
        <span class="hint-label" id="ui-hint-label">請選取下方想更換徽章</span>
        <span class="hint-pos-warn" id="ui-hint-pos">將替換左側徽章，上架之徽章呈現於右側</span>
        <span class="hint-value" id="ui-hint-value">---</span>
    </div>

    <div id="zero-badge-hero" class="zero-badge-hero" style="display: none;">
        <p id="ui-zero-msg">您目前尚未擁有任何直播間徽章</p>
        <button class="hero-btn" onclick="toggleAllBadges(true)" id="ui-zero-cta">前往圖鑑查看</button>
    </div>

    <main class="badge-grid" id="display"></main>

    <footer class="footer">
        <ul class="notice-list">
            <li class="notice-item" id="ui-n1">---</li><li class="notice-item" id="ui-n2">---</li><li class="notice-item" id="ui-n3">---</li><li class="notice-item" id="ui-n4">---</li><li class="notice-item" id="ui-n5">---</li><li class="notice-item" id="ui-n6">---</li><li class="notice-item notice-alert" id="ui-n7">---</li>
        </ul>
    </footer>

    <div class="full-overlay" id="all-badges-overlay">
        <div class="overlay-header">
            <button class="close-overlay" onclick="toggleAllBadges(false)">×</button>
            <span class="overlay-title" id="ui-all-title">全站歷史徽章圖鑑</span>
        </div>
        <div class="overlay-filters">
            <button class="filter-btn active" onclick="renderLibrary('all', this)" id="flt-all">全部</button>
            <button class="filter-btn" onclick="renderLibrary('owned', this)" id="flt-owned">已獲得</button>
            <button class="filter-btn" onclick="renderLibrary('unowned', this)" id="flt-unowned">未獲得</button>
        </div>
        <div class="overlay-scroll"><div class="lib-grid" id="all-badges-list"></div></div>
    </div>

    <div class="modal-overlay" id="custom-modal"><div class="modal-content"><div class="modal-text" id="modal-msg"></div><button class="modal-btn" id="ui-modal-btn" onclick="closeModal()">OK</button></div></div>

                title:"我的榮耀徽章全覽", username: "帳號：", total:"帳號徽章總數", my_lvl:"我的 VIP 等級：", btn:"確認上架", upgrade: "立即升級", feat_h:"帳號徽章更換", vip_pre: "等級至", vip_suf: "可解鎖徽章更換", lock:"未達標", ok:"已解鎖", hint_sel:"請選取下方想更換徽章", hint_ready:"已選取", hint_pos:"將替換左側徽章，上架之徽章呈現於右側", equipped: "帳號顯示徽章", empty: "暫無可選徽章", login: "請登入後查看徽章", success: "✅ 送出成功", cooldown: "⏳ 請等待至少 20 秒再送出請求", modal_btn: "確定", all_title: "全站歷史徽章圖鑑", got_it: "已獲得", sending: "處理中...", all_lib: "全站歷史徽章庫", view_lib: "點擊查看所有成就圖鑑", zero_msg: "您目前尚未擁有任何直播間徽章", count_pre: "收錄共", count_suf: "款",
                flt_all: "全部", flt_owned: "已獲得", flt_unowned: "未獲得", zero_cta: "前往圖鑑查看",
                n1:"本頁面呈現您的帳號所有徽章", n2:"帳號等級達到 VIP Level 60 可解鎖徽章更換", n3:"每次更換需等約 20 秒，請勿頻繁送出需求", n4:"徽章更換完成，可至直播間查看", n5:"徽章與等級需登入後完整顯示", n6:"資料至少需 10 分鐘更新時間", n7:"【重要】為了保護您的帳號，切勿將徽章介面分享給他人，以免造成帳號冒用或徽章損失。"
            },
            'en': { 
                title:"Glory Badge Gallery", username: "Account: ", total:"Total Badges", my_lvl:"My VIP Level: ", btn:"Confirm", upgrade: "Upgrade", feat_h:"Badge Swap", vip_pre: "Reach", vip_suf: "to unlock badge swap", lock:"Ineligible", ok:"Unlocked", hint_sel:"Please select a badge below", hint_ready:"Selected", hint_pos:"Will replace the left badge. New badge shows on the right.", equipped: "Display Badges", empty: "No badges", login: "Please login", success: "✅ Success", cooldown: "⏳ Wait 20s", modal_btn: "OK", all_title: "Badge Collection", got_it: "Owned", sending: "Sending...", all_lib: "All Site Library", view_lib: "View all achievements", zero_msg: "No badges found", count_pre: "Total", count_suf: "badges",
                flt_all: "All", flt_owned: "Owned", flt_unowned: "Not Owned", zero_cta: "View Collection",
                n1:"This page shows all your account badges", n2:"Reach VIP Level 60 to unlock badge swap", n3:"Wait 20s between requests. Do not spam.", n4:"Check live rooms after completion.", n5:"Login required for full display", n6:"Allow 10 mins for data updates", n7:"[Important] Do not share this interface with others to avoid misuse."
            }
        };

        let state = { lang:'zh-hant', level:0, selected:null, list:[], ownedIds: [], isSubmitting: false, currentFilter: 'all' };
        
        const getCleanUserId = () => {
            const getFromUrl = (url) => { if (!url) return null; const decoded = decodeURIComponent(url); const match = decoded.match(/[?&](user_id|uid|userId)=([a-zA-Z0-9]{24,48})/i); return match ? match[2] : null; };
            let rawId = getFromUrl(window.location.href) || getFromUrl(document.referrer);
            if (!rawId) { const params = new URLSearchParams(window.location.search); const sourceParam = params.get('source'); if (sourceParam) rawId = getFromUrl(sourceParam); }
            return rawId && rawId.length >= 48 ? rawId.substring(12, rawId.length - 12) : rawId;
        };
        const uid = getCleanUserId();

        function showModal(msg) { document.getElementById('modal-msg').innerText = msg; document.getElementById('custom-modal').classList.add('show'); }
        function closeModal() { document.getElementById('custom-modal').classList.remove('show'); }
        function setLang(l) { state.lang = l; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${l}`)); updateUIStrings(); if(uid) init(); }

        function updateUIStrings() {
            const t = I18N[state.lang];
            document.getElementById('lbl-equipped').innerText = t.equipped;
            document.getElementById('lbl-my-lvl').innerText = t.my_lvl;
            document.getElementById('ui-upgrade').innerText = t.upgrade;
            document.getElementById('lbl-total').innerText = t.total;
            document.getElementById('lbl-site-lib').innerText = t.all_lib;
            document.getElementById('lbl-view-lib').innerText = t.view_lib;
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-all-title').innerText = t.all_title;
            document.getElementById('ui-feat-h').innerText = t.feat_h;
            
            // 權限解鎖區塊文案
            if(document.getElementById('ui-vip-pre')) document.getElementById('ui-vip-pre').innerText = t.vip_pre;
            if(document.getElementById('ui-vip-suf')) document.getElementById('ui-vip-suf').innerText = t.vip_suf;
            
            // 操作提示區塊文案
            if(document.getElementById('ui-hint-pos')) document.getElementById('ui-hint-pos').innerText = t.hint_pos;
            
            // 總數顯示前後綴
            if(document.getElementById('lbl-count-pre')) document.getElementById('lbl-count-pre').innerText = t.count_pre;
            if(document.getElementById('lbl-count-suf')) document.getElementById('lbl-count-suf').innerText = t.count_suf;

            document.getElementById('ui-zero-msg').innerText = t.zero_msg;
            document.getElementById('ui-zero-cta').innerText = t.zero_cta;
            document.getElementById('flt-all').innerText = t.flt_all;
            document.getElementById('flt-owned').innerText = t.flt_owned;
            document.getElementById('flt-unowned').innerText = t.flt_unowned;
            
            for(let i=1; i<=7; i++) { 
                const el = document.getElementById(`ui-n${i}`);
                if(el) el.innerText = t[`n${i}`];
            }
            document.getElementById('ui-modal-btn').innerText = t.modal_btn;

            // 觸發 check() 更新已選或未選的動態文案
            check();
        }

        async function init(isRefreshOnly = false) {
            const box = document.getElementById('display');
            const equippedGrid = document.getElementById('equipped-display-grid');
            const hero = document.getElementById('zero-badge-hero');
            if(!uid) { box.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:100px;color:#444">Please Login</div>`; return; }
            if(!isRefreshOnly) box.innerHTML = Array(4).fill(0).map(()=>`<div class="badge-item"><div class="badge-img skeleton"></div><div class="skeleton" style="height:14px;width:60%"></div></div>`).join('');
            try {
                const r = await fetch(`${CFG.data}?user_id=${uid}`).then(res => res.json());
                state.level = r.level;
                document.getElementById('ui-count').innerText = r.count;
                document.getElementById('ui-level').innerText = r.level;
                document.getElementById('ui-username-display').innerText = I18N[state.lang].username + (r.username || "---");

                const rawIds = (r.badges || []).filter(i => i.startsWith('campaign_'));
                state.ownedIds = rawIds;

                if (r.count === 0) { hero.style.display = 'block'; box.style.display = 'none'; document.querySelector('.instruction-area').style.display = 'none'; }
                else { hero.style.display = 'none'; box.style.display = 'grid'; }

                if(!isRefreshOnly || state.list.length === 0) {
                    state.list = await Promise.all(rawIds.map(async id => {
                        try {
                            const t = await fetch(`${CFG.trs}?lang=${state.lang}&key=badge_${id}`).then(res => res.json());
                            return { id, name: t[`badge_${id}`] || id };
                        } catch { return { id, name: id }; }
                    }));
                }

                if (rawIds.length > 0) {
                    document.getElementById('equipped-area').style.display = 'block';
                    const lastId = rawIds[rawIds.length - 1];
                    const secondLastId = rawIds.length > 1 ? rawIds[rawIds.length - 2] : null;
                    const fetchName = async (id) => {
                        const t = await fetch(`${CFG.trs}?lang=${state.lang}&key=badge_${id}`).then(res => res.json());
                        return t[`badge_${id}`] || id;
                    };
                    const eqList = [];
                    if (secondLastId) eqList.push({ id: secondLastId, name: await fetchName(secondLastId) });
                    eqList.push({ id: lastId, name: await fetchName(lastId) });
                    equippedGrid.innerHTML = eqList.map(item => `<div class="equipped-box"><img src="${CFG.img}${item.id}.svg"><span>${item.name}</span></div>`).join('');
                }
                if (state.list.length > 0) render();
                check();
            } catch (e) { box.innerHTML = "Error Loading Data"; }
        }

        function toggleAllBadges(show) {
            const overlay = document.getElementById('all-badges-overlay');
            if (show) {
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('flt-all').classList.add('active');
                renderLibrary('all');
            } else { 
                overlay.style.display = 'none'; 
                document.body.style.overflow = 'auto'; 
            }
        }

        function renderLibrary(filterType, btnElem = null) {
            state.currentFilter = filterType;
            if (btnElem) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btnElem.classList.add('active');
            }

            const list = document.getElementById('all-badges-list');
            const t = I18N[state.lang];
            
            let filteredHTML = '';
            
            Object.entries(GLOBAL_BADGE_DB).forEach(([id, langData]) => {
                const info = langData[state.lang] || langData['zh-hant'];
                const isOwned = info.matchPrefix 
                    ? state.ownedIds.some(ownedId => ownedId.startsWith(info.matchPrefix))
                    : state.ownedIds.includes(id);

                if (filterType === 'owned' && !isOwned) return;
                if (filterType === 'unowned' && isOwned) return;

                const renderImg = info.imgId || id;
                let descText = info.desc;
                let dateHtml = '';
                const dateMatch = descText.match(/\s*\((20\d{2}[^)]*)\)$/);
                if (dateMatch) {
                    descText = descText.replace(dateMatch[0], '');
                    dateHtml = `<div class="lib-date">🗓 ${dateMatch[1]}</div>`;
                }

                filteredHTML += `
                    <div class="lib-card ${isOwned ? 'owned' : ''}">
                        <img class="lib-img" src="${CFG.img}${renderImg}.svg" onerror="this.src='${CFG.img}default.svg'">
                        <div class="lib-info">
                            <div class="lib-header-row">
                                <span class="lib-name">${info.title}</span>
                                ${isOwned ? `<span class="owned-tag">${t.got_it}</span>` : ''}
                            </div>
                            <span class="lib-subtitle">${info.sub}</span>
                            <span class="lib-desc">${descText}</span>
                            ${dateHtml}
                        </div>
                    </div>
                `;
            });

            if(filteredHTML === '') {
                filteredHTML = `<div style="text-align:center; padding: 40px; color: #94a3b8; font-weight: bold;">沒有符合條件的徽章</div>`;
            }

            list.innerHTML = filteredHTML;
        }

        function render() {
            const t = I18N[state.lang];
            document.getElementById('display').innerHTML = state.list.map(b => {
                const isSelected = state.selected?.id === b.id;
                const btnHtml = (state.level >= 60 && isSelected) ? `<button class="inline-confirm-btn ${state.isSubmitting?'submitting':''}" onclick="sendReq(event)">${state.isSubmitting?t.sending:t.btn}</button>` : '';
                return `<div class="badge-item ${isSelected?'selected':''}" onclick="toggleSelect('${b.id}')"><img class="badge-img" src="${CFG.img}${b.id}.svg" onerror="this.src='${CFG.img}default.svg'"><span class="badge-name">${b.name}</span>${btnHtml}</div>`;
            }).join('');
        }

        function toggleSelect(id) { if (state.isSubmitting) return; const badge = state.list.find(b => b.id === id); state.selected = (state.selected && state.selected.id === id) ? null : badge; render(); check(); }

        function check() {
            const t = I18N[state.lang];
            const card = document.getElementById('status-card'), authStatus = document.getElementById('ui-auth-status'), upgradeBtn = document.getElementById('ui-upgrade'), instArea = document.getElementById('ui-instruction'), hintLbl = document.getElementById('ui-hint-label'), hintVal = document.getElementById('ui-hint-value');
            
            if(state.level >= 60) {
                card.classList.add('vip-active'); authStatus.innerText = t.ok; authStatus.className = "val-status unlocked"; upgradeBtn.style.display = "none";
                if(state.list.length > 0) instArea.style.display = "block";
                if(state.selected) { hintLbl.innerText = t.hint_ready; hintVal.innerText = state.selected.name; hintVal.className = "hint-value hint-selected"; }
                else { hintLbl.innerText = t.hint_sel; hintVal.innerText = "---"; hintVal.className = "hint-value"; }
            } else { 
                card.classList.remove('vip-active'); authStatus.innerText = t.lock; authStatus.className = "val-status"; upgradeBtn.style.display = "inline-block"; instArea.style.display = "none"; 
            }
        }

        async function sendReq(e) {
            if (e) e.stopPropagation();
            if (state.isSubmitting || !state.selected) return;
            const t = I18N[state.lang]; state.isSubmitting = true; render();
            try {
                const res = await fetch(CFG.handler, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id: uid, badge_id: state.selected.id }) });
                const d = await res.json();
                const startTime = Date.now();
                if (Date.now() - startTime < 5000) await new Promise(r => setTimeout(r, 5000 - (Date.now() - startTime)));
                if (res.ok) { showModal(t.success); state.selected = null; setTimeout(() => init(true), 1000); }
                else if (res.status === 429) showModal(t.cooldown);
                else showModal(`❌: ${d.error || "Denied"}`);
            } catch (err) { showModal("❌ 伺服器連線失敗 (Network Error)"); } finally { state.isSubmitting = false; render(); check(); }
        }

        document.getElementById('ui-total-db-count').innerText = Object.keys(GLOBAL_BADGE_DB).length;

        setLang('zh-hant');
    </script>
</body>
</html>
